{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row align-items-center mb-4">
        <div class="col-md-8">
            <h2 class="mb-0"><i class="fas fa-bell text-primary"></i> System Logs</h2>
            <p class="text-muted">Recent events and background sync logs.</p>
        </div>
        <div class="col-md-4 text-md-end">
            <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
    </div>

    <div class="card shadow border-0">
        <div class="card-body bg-dark text-light rounded">
            <pre id="log-content" style="max-height: 600px; overflow-y: auto; font-family: monospace; font-size: 0.9em; white-space: pre-wrap;">
{% if logs %}
{{ logs }}
{% else %}
No recent logs found.
{% endif %}
            </pre>
        </div>
        <div class="card-footer bg-transparent border-top-0 text-end">
            <form action="{{ url_for('main.clear_logs') }}" method="POST" class="d-inline" id="clearLogsForm">
                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirmAction(event, 'clearLogsForm');">
                    <i class="fas fa-trash"></i> Clear Logs
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    // Auto-scroll to bottom of logs on load
    document.addEventListener("DOMContentLoaded", function() {
        var logContainer = document.getElementById("log-content");
        if(logContainer) {
            logContainer.scrollTop = logContainer.scrollHeight;
        }
    });
</script>
{% endblock %}
