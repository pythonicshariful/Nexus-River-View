<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a237e;
            --accent-color: #ffd700;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            background: url('/static/images/login_bg.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 2;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-logo h1 {
            color: #fff;
            font-weight: 800;
            margin: 0;
            font-size: 1.8rem;
        }

        .form-label {
            color: #fff;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: #fff;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--accent-color);
            color: #fff;
            box-shadow: none;
        }

        .btn-action {
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 700;
            color: #000;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s;
        }

        .btn-action:hover {
            background: #fff;
            transform: translateY(-2px);
        }

        .back-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.85rem;
            display: block;
            text-align: center;
            margin-top: 1.5rem;
        }

        .alert {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 12px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-logo">
            <h1>Set Password</h1>
            <p style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">Verification successful</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} mb-4" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="username" value="{{ username }}">
            
            <div class="mb-4">
                <label class="form-label">Reset Code (OTP)</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0 text-white-50"><i class="fas fa-key"></i></span>
                    <input type="text" name="otp" class="form-control" placeholder="6-digit code" required autofocus maxlength="6">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">New Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0 text-white-50"><i class="fas fa-lock"></i></span>
                    <input type="password" name="new_password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-action">Update Password</button>
            <a href="{{ url_for('main.login') }}" class="back-link"><i class="fas fa-arrow-left me-2"></i>Cancel</a>
        </form>
    </div>
</body>
</html>
