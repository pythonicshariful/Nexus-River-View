{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow mt-4">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">{{ 'Edit' if employee else 'Add' }} Employee</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Employee ID *</label>
                            <input type="text" name="employee_id" class="form-control" value="{{ employee.employee_id if employee else '' }}" required {{ 'readonly' if employee else '' }}>
                            {% if not employee %}
                                <div class="form-text">A unique identifier for this employee.</div>
                            {% endif %}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Full Name *</label>
                            <input type="text" name="name" class="form-control" value="{{ employee.name if employee else '' }}" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Designation</label>
                            <input type="text" name="designation" class="form-control" value="{{ employee.designation if employee else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Department</label>
                            <input type="text" name="department" class="form-control" value="{{ employee.department if employee else '' }}">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Joining Date</label>
                            <!-- Use text or date input (e.g. DD-MM-YYYY), maintaining the string format strategy of the app -->
                            <input type="date" name="joining_date" class="form-control" value="{{ employee.joining_date if employee else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone Number</label>
                            <input type="text" name="phone" class="form-control" value="{{ employee.phone if employee else '' }}">
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-12">
                            <label class="form-label fw-bold">Net Salary (Monthly) *</label>
                            <div class="input-group">
                                <span class="input-group-text">৳</span>
                                <input type="number" step="0.01" name="net_salary" class="form-control form-control-lg" value="{{ employee.net_salary if employee else '' }}" required>
                            </div>
                        </div>
                    </div>
                    
                    <h5 class="mb-3 border-bottom pb-2">Yearly Leave Allocations</h5>
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <label class="form-label">Casual (CL)</label>
                            <input type="number" name="cl_total" class="form-control" value="{{ employee.cl_total if employee else 10 }}" min="0">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Medical (ML)</label>
                            <input type="number" name="ml_total" class="form-control" value="{{ employee.ml_total if employee else 14 }}" min="0">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Festival (FL)</label>
                            <input type="number" name="fl_total" class="form-control" value="{{ employee.fl_total if employee else 0 }}" min="0">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Earned (EL)</label>
                            <input type="number" name="el_total" class="form-control" value="{{ employee.el_total if employee else 0 }}" min="0">
                        </div>
                    </div>

                    {% if not verify_password %}
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-danger">Admin Password *</label>
                            <input type="password" name="admin_password" class="form-control" required placeholder="Enter Admin Password" autocomplete="new-password">
                        </div>
                    </div>
                    {% endif %}

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('main.manage_employees') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">{{ 'Update' if employee else 'Save' }} Employee</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
